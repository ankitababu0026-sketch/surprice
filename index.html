<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be Mine?</title>
    <style>
        body { 
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; 
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 50%, #fbc2eb 100%); 
            font-family: sans-serif; overflow: hidden; 
        }
        .container { 
            text-align: center; background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(10px); 
            padding: 30px; border-radius: 30px; width: 85%; max-width: 350px; 
            border: 2px solid rgba(255, 255, 255, 0.5); box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
        }
        h1 { color: #fff; text-shadow: 2px 2px 10px rgba(0,0,0,0.3); }
        button { 
            padding: 15px 30px; font-size: 18px; border: none; border-radius: 50px; 
            cursor: pointer; font-weight: bold; width: 100%; margin: 10px 0; transition: 0.3s; 
        }
        #yesBtn { background: #ff4757; color: white; }
        #noBtn { background: #57606f; color: white; position: relative; }
        .popup { display: none; position: fixed; top:0; left:0; width:100%; height:100%; 
                 background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 100; }
        .popup-content { background: white; padding: 20px; border-radius: 25px; width: 90%; max-width: 300px; text-align: center; }
        .popup-content img { width: 100%; border-radius: 15px; }
    </style>
</head>
<body>
    <div id="balloons-container"></div>
    <div class="container">
        <h1>Will you be mine?</h1>
        <button id="yesBtn" onclick="showGift()">Yes</button>
        <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">No</button>
    </div>
    <div id="giftPopup" class="popup">
        <div class="popup-content">
            <img src="https://media.tenor.com/2s1c1vL_r8AAAAAi/rabbit-hearts.gif" alt="Gift">
            <h2>हाँ बाबू, I love you too! ❤️</h2>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        function showGift() {
            document.getElementById('giftPopup').style.display = 'flex';
            confetti();
        }
        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            noBtn.style.position = 'absolute';
            noBtn.style.left = Math.random() * (window.innerWidth - 100) + 'px';
            noBtn.style.top = Math.random() * (window.innerHeight - 50) + 'px';
        }
    </script>
</body>
</html>
