<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be Mine?</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { 
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; 
            background: radial-gradient(circle, #ff7eb3, #6a11cb); /* गहरा और रंगीन बैकग्राउंड */
            font-family: 'Arial', sans-serif; overflow: hidden; 
        }
        .container { 
            text-align: center; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(15px); 
            padding: 30px; border-radius: 30px; width: 85%; max-width: 350px; 
            border: 2px solid rgba(255, 255, 255, 0.2); box-shadow: 0 15px 35px rgba(0,0,0,0.5); 
        }
        h1 { color: #fff; font-size: 24px; text-shadow: 2px 2px 5px rgba(0,0,0,0.5); margin-bottom: 25px; }
        
        .btn-wrapper { position: relative; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        button { 
            padding: 12px 40px; font-size: 18px; border: none; border-radius: 50px; 
            cursor: pointer; font-weight: bold; transition: 0.3s; width: 200px;
        }
        #yesBtn { background: #ff4757; color: white; }
        #noBtn { background: #a29bfe; color: white; position: relative; }
        
        .popup { display: none; position: fixed; top:0; left:0; width:100%; height:100%; 
                 background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 100; }
        .popup-content { background: rgba(255, 255, 255, 0.9); padding: 25px; border-radius: 30px; width: 85%; max-width: 320px; text-align: center; }
        .popup-content img { width: 100%; border-radius: 20px; }
        .glow-text { color: #d63031; font-size: 18px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>बाबू, क्या तुम मेरे से प्यार करती हो और मेरे साथ रहना चाहोगी?</h1>
        <div class="btn-wrapper">
            <button id="yesBtn" onclick="showGift()">Yes</button>
            <button id="noBtn" onmouseover="moveNo()">No</button>
        </div>
    </div>

    <div id="giftPopup" class="popup">
        <div class="popup-content">
            <img src="https://media.tenor.com/2s1c1vL_r8AAAAAi/rabbit-hearts.gif" alt="Surprise">
            <h2 class="glow-text">हाँ बाबू, मुझे पता था कि तुम भी मेरे से प्यार करती हो! <br>I love you too baby! ummmaaaaa... 😘</h2>
        </div>
    </div>

    <script>
        function showGift() {
            document.getElementById('giftPopup').style.display = 'flex';
            confetti({ particleCount: 300, spread: 150, origin: { y: 0.6 } });
        }
        function moveNo() {
            const noBtn = document.getElementById('noBtn');
            // अब यह बटन कंटेनर के अंदर ही घूमेगा, स्क्रीन से बाहर नहीं जाएगा
            const x = (Math.random() - 0.5) * 200;
            const y = (Math.random() - 0.5) * 200;
            noBtn.style.transform = `translate(${x}px, ${y}px)`;
        }
    </script>
</body>
</html>
