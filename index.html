<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Will You Be Mine?</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; height: 100vh; background: linear-gradient(135deg, #ff9a9e, #a18cd1); font-family: sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .container { text-align: center; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); padding: 20px; border-radius: 20px; width: 90%; max-width: 320px; border: 2px solid rgba(255, 255, 255, 0.3); z-index: 10; }
        h1 { color: #fff; font-size: 20px; margin-bottom: 20px; }
        .btn-box { display: flex; flex-direction: column; gap: 10px; align-items: center; min-height: 120px; }
        button { padding: 10px 25px; font-size: 16px; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; width: 140px; }
        #yesBtn { background: #ff4757; color: white; }
        #noBtn { background: #6c5ce7; color: white; position: relative; }
        .popup { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 100; }
        .popup-content { background: white; padding: 20px; border-radius: 20px; width: 90%; max-width: 300px; text-align: center; }
        /* वीडियो की स्टाइलिंग */
        .popup-content video { width: 100%; border-radius: 15px; }
        .glow-text { color: #d63031; font-size: 16px; font-weight: bold; margin-top: 15px; }
        .item { position: absolute; font-size: 20px; animation: floatUp 6s linear infinite; z-index: 1; pointer-events: none; }
        @keyframes floatUp { 0% { bottom: -10%; opacity: 1; } 100% { bottom: 110%; opacity: 0; } }
    </style>
</head>
<body>
    <div class="container">
        <h1>बाबू, क्या तुम मेरे से प्यार करती हो और मेरे साथ रहना चाहोगी?</h1>
        <div class="btn-box">
            <button id="yesBtn" onclick="showGift()">Yes</button>
            <button id="noBtn" onmouseover="moveNo()" onclick="moveNo()">No</button>
        </div>
    </div>

    <div id="giftPopup" class="popup">
        <div class="popup-content">
            <!-- यहाँ तुम्हारी वीडियो फाइल का नाम है -->
            <video src="VID-20260710-WA0003.mp4" autoplay loop playsinline muted></video>
            <h2 class="glow-text">हाँ बाबू, मुझे पता था कि तुम भी मेरे से प्यार करती हो! I love you too Babu ummmmaaa... 😘</h2>
        </div>
    </div>

    <script>
        setInterval(() => {
            let item = document.createElement('div');
            item.className = 'item';
            item.innerHTML = Math.random() > 0.5 ? '🎈' : '❤️';
            item.style.left = Math.random() * 90 + '%';
            document.body.appendChild(item);
            setTimeout(() => item.remove(), 6000);
        }, 800);

        function showGift() {
            document.getElementById('giftPopup').style.display = 'flex';
            confetti({ particleCount: 200, spread: 100 });
        }

        function moveNo() {
            const noBtn = document.getElementById('noBtn');
            const newX = (Math.random() - 0.5) * 100;
            const newY = (Math.random() - 0.5) * 100;
            noBtn.style.transform = `translate(${newX}px, ${newY}px)`;
        }
    </script>
</body>
</html>
