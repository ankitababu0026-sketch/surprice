<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Will You Be Mine?</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; 
               background: linear-gradient(135deg, #ff9a9e, #a18cd1); overflow: hidden; font-family: 'Arial', sans-serif; }
        
        .container { text-align: center; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(15px); 
                     padding: 30px; border-radius: 30px; width: 85%; max-width: 350px; 
                     border: 2px solid rgba(255, 255, 255, 0.5); box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        
        h1 { color: #ffffff; font-size: 26px; text-shadow: 2px 2px 10px rgba(0,0,0,0.3); margin-bottom: 25px; }
        
        button { padding: 15px 30px; font-size: 18px; border: none; border-radius: 50px; 
                 cursor: pointer; font-weight: bold; width: 100%; margin: 10px 0; transition: 0.3s; }
        #yesBtn { background: #ff4757; color: white; box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4); }
        #noBtn { background: #a29bfe; color: white; position: relative; }

        .popup { display: none; position: fixed; top:0; left:0; width:100%; height:100%; 
                 background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 100; }
        .popup-content { background: white; padding: 25px; border-radius: 30px; width: 85%; max-width: 320px; text-align: center; }
        .popup-content img { width: 100%; border-radius: 20px; margin-bottom: 15px; }
        
        .glow-text { color: #ff4757; font-size: 20px; text-shadow: 0 0 10px #ff7675, 0 0 20px #ff7675; line-height: 1.5; }

        .item { position: absolute; font-size: 24px; animation: floatUp 8s linear infinite; pointer-events: none; }
        @keyframes floatUp { 0% { bottom: -10%; opacity: 1; } 100% { bottom: 110%; opacity: 0; } }
    </style>
</head>
<body>
    <script>
        // गुब्बारे और दिल उड़ाना
        for(let i=0; i<15; i++) {
            let item = document.createElement('div');
            item.className = 'item';
            item.innerHTML = i % 2 == 0 ? '🎈' : '❤️';
            item.style.left = Math.random() * 100 + '%';
            item.style.animationDelay = Math.random() * 8 + 's';
            document.body.appendChild(item);
        }
    </script>

    <div class="container">
        <h1>बाबू, क्या तुम मेरे से प्यार करती हो और मेरे साथ रहना चाहोगी?</h1>
        <button id="yesBtn" onclick="showGift()">Yes</button>
        <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">No</button>
    </div>

    <div id="giftPopup" class="popup">
        <div class="popup-content">
            <img src="https://media.tenor.com/2s1c1vL_r8AAAAAi/rabbit-hearts.gif" alt="Surprise">
            <h2 class="glow-text">हाँ बाबू, मुझे पता था कि तुम भी मेरे से प्यार करती हो! <br>I love you too baby! ummmaaaaa... 😘</h2>
        </div>
    </div>

    <script>
        function showGift() {
            document.getElementById('giftPopup').style.display = 'flex';
            confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
        }
        function moveButton() {
            const noBtn = document.getElementById('noBtn');
            const yesBtn = document.getElementById('yesBtn');
            const rect = yesBtn.getBoundingClientRect();
            // 'Yes' के पास-पास भागेगा
            noBtn.style.position = 'fixed';
            noBtn.style.left = (rect.left + (Math.random() * 100 - 50)) + 'px';
            noBtn.style.top = (rect.bottom + 20) + 'px';
        }
    </script>
</body>
</html>
